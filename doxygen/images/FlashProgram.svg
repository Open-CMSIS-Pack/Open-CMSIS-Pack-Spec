<svg xmlns="http://www.w3.org/2000/svg" width="574" height="360.34" viewBox="0 0 720 452" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Flash Program sequence</title>
  <desc id="desc">Flow for programming flash content by loading an FLM algorithm, initializing it, programming a page, and uninitializing it for each AXF content block.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#1f1f1f"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; font-size: 17px; fill: #000000; }
      .box, .band { fill: #fff; stroke: #1f1f1f; stroke-width: 1.2; }
      .default { fill: #c9d9ec; }
      .empty { fill: #e8bcb8; }
      .label { text-anchor: middle; dominant-baseline: middle; }
      .seq { font-style: italic; fill: #000; }
      .small { font-size: 14px; }
      .edge { fill: none; stroke: #1f1f1f; stroke-width: 2.2; marker-end: url(#arrow); }
      .thin { stroke: #1f1f1f; stroke-width: 1.2; }
    </style>
  </defs>

  <g>
    <rect class="box" x="20" y="20" width="470" height="42"/>
    <text class="label" x="255" y="41">For all AXF Content</text>

    <rect class="box" x="20" y="62" width="470" height="42"/>
    <text class="label" x="255" y="83">Execute "Init"</text>

    <rect class="band" x="20" y="104" width="470" height="60"/>
    <line class="thin" x1="20" y1="104" x2="200" y2="164"/>
    <line class="thin" x1="490" y1="104" x2="200" y2="164"/>
    <text class="label" x="255" y="128">Flash Algorithm in FLM</text>
    <text x="28" y="150">False</text>
    <text x="442" y="150">True</text>

    <rect class="box" x="20" y="164" width="180" height="228"/>
    <rect class="box" x="200" y="164" width="290" height="46"/>
    <text class="label" x="345" y="187">Load Algorithm in RAM</text>
    <rect class="box" x="200" y="210" width="290" height="46"/>
    <text class="label" x="345" y="233">Execute "Init"</text>
    <rect class="box" x="200" y="256" width="290" height="46"/>
    <text class="label" x="345" y="279">Load Application in RAM Buffer</text>
    <rect class="box" x="200" y="302" width="290" height="46"/>
    <text class="label" x="345" y="325">Execute "Program Page"</text>
    <rect class="box" x="200" y="348" width="290" height="44"/>
    <text class="label" x="345" y="370">Execute "Uninit"</text>

    <rect class="box empty" x="20" y="392" width="470" height="46"/>
    <text class="label seq" x="255" y="415">FlashProgramDone</text>
  </g>

  <g>
    <path class="edge" d="M490 348 H585 V256 H490"/>
    <text class="label" x="562" y="302" transform="rotate(90 562 302)">
      <tspan x="562" dy="0">Repeat</tspan>
      <tspan x="562" dy="19">Until</tspan>
      <tspan x="562" dy="19">done</tspan>
    </text>
  </g>

  <g>
    <rect class="box default" x="535" y="20" width="165" height="48"/>
    <text class="label seq small" x="617.5" y="35">
      <tspan x="617.5" dy="0">Sequence Name with</tspan>
      <tspan x="617.5" dy="17">defined default</tspan>
    </text>
    <rect class="box empty" x="535" y="82" width="165" height="48"/>
    <text class="label seq small" x="617.5" y="97">
      <tspan x="617.5" dy="0">Sequence Name with</tspan>
      <tspan x="617.5" dy="17">empty default</tspan>
    </text>
  </g>
</svg>
