<svg xmlns="http://www.w3.org/2000/svg" width="574" height="342.81" viewBox="0 0 720 430" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Flash Erase sequence</title>
  <desc id="desc">Flow for erase operations using chip erase or sector erase with optional blank checking.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#1f1f1f"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; font-size: 17px; fill: #000000; }
      .box, .band { fill: #fff; stroke: #1f1f1f; stroke-width: 1.2; }
      .default { fill: #c9d9ec; }
      .empty { fill: #e8bcb8; }
      .label { text-anchor: middle; dominant-baseline: middle; }
      .seq { font-style: italic; fill: #000; }
      .small { font-size: 14px; }
      .edge { fill: none; stroke: #1f1f1f; stroke-width: 2.2; marker-end: url(#arrow); }
      .thin { stroke: #1f1f1f; stroke-width: 1.2; }
    </style>
  </defs>

  <g>
    <rect class="box" x="20" y="20" width="470" height="42"/>
    <text class="label" x="255" y="41">Load Flash Algorithm in RAM</text>
    <rect class="box" x="20" y="62" width="470" height="42"/>
    <text class="label" x="255" y="83">Execute "Init"</text>

    <rect class="band" x="20" y="104" width="470" height="58"/>
    <line class="thin" x1="20" y1="104" x2="160" y2="162"/>
    <line class="thin" x1="490" y1="104" x2="160" y2="162"/>
    <text class="label" x="250" y="127">Erase</text>
    <text x="28" y="147">Chip</text>
    <text x="420" y="147">Sectors</text>

    <rect class="box" x="20" y="162" width="150" height="150"/>
    <text class="label" x="95" y="207">
      <tspan x="95" dy="0">Execute</tspan>
      <tspan x="95" dy="19">"EraseChip"</tspan>
    </text>

    <rect class="box" x="170" y="162" width="320" height="44"/>
    <text class="label" x="330" y="184">Execute "BlankCheck"</text>

    <rect class="band" x="170" y="206" width="320" height="58"/>
    <line class="thin" x1="170" y1="206" x2="330" y2="264"/>
    <line class="thin" x1="490" y1="206" x2="330" y2="264"/>
    <text class="label" x="330" y="225">Sector is blank</text>
    <text x="178" y="250">True</text>
    <text x="428" y="250">False</text>

    <rect class="box" x="170" y="264" width="160" height="48"/>
    <rect class="box" x="330" y="264" width="160" height="48"/>
    <text class="label" x="410" y="278">
      <tspan x="410" dy="0">Execute</tspan>
      <tspan x="410" dy="19">"EraseSector"</tspan>
    </text>

    <rect class="box" x="20" y="312" width="470" height="42"/>
    <text class="label" x="255" y="333">Execute "Uninit"</text>
    <rect class="box empty" x="20" y="354" width="470" height="46"/>
    <text class="label seq" x="255" y="377">FlashEraseDone</text>
  </g>

  <g>
    <path class="edge" d="M490 354 H585 V162 H490"/>
    <text class="label" x="562" y="258" transform="rotate(90 562 258)">
      <tspan x="562" dy="0">Repeat for each</tspan>
      <tspan x="562" dy="19">Sector</tspan>
    </text>
  </g>

  <g>
    <rect class="box default" x="535" y="20" width="165" height="48"/>
    <text class="label seq small" x="617.5" y="35">
      <tspan x="617.5" dy="0">Sequence Name with</tspan>
      <tspan x="617.5" dy="17">defined default</tspan>
    </text>
    <rect class="box empty" x="535" y="82" width="165" height="48"/>
    <text class="label seq small" x="617.5" y="97">
      <tspan x="617.5" dy="0">Sequence Name with</tspan>
      <tspan x="617.5" dy="17">empty default</tspan>
    </text>
  </g>
</svg>
